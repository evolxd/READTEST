<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TCF 阅读学习系统</title>
<link rel="icon" href="data:,">
<style>
:root{
  --bg:#f4f6f8;
  --card:#ffffff;
  --line:#d9dee5;
  --text:#223;
  --muted:#6b7280;
  --blue:#2563eb;
  --blue2:#eff6ff;
  --okbg:#f0fdf4;
  --badbg:#fef2f2;
}

*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

#top{
  background:#1f2937;
  color:#fff;
  padding:10px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
#top b{
  font-weight:900;
  font-size:20px;
}
select,button{
  border:none;
  border-radius:10px;
  padding:8px 12px;
  font-weight:800;
}
button{
  cursor:pointer;
  background:var(--blue);
  color:#fff;
}
button.ghost{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
}
#qLabel{
  min-width:90px;
  text-align:center;
  font-weight:900;
}

#main{
  flex:1;
  display:grid;
  grid-template-columns:22% 33% 45%;
  gap:10px;
  padding:10px;
  overflow:hidden;
}

.panel{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-width:0;
}
.header{
  padding:12px 14px;
  border-bottom:1px solid #eceff3;
  font-weight:900;
  background:#fafbfc;
  font-size:18px;
}
.body{
  padding:14px;
  overflow:auto;
  flex:1;
}

#questionBox{
  font-size:18px;
  font-weight:900;
  line-height:1.6;
  margin-bottom:12px;
  padding:14px 16px;
  background:#f8fafc;
  border-left:5px solid var(--blue);
  border-radius:14px;
  word-break:break-word;
}

.option{
  display:flex;
  gap:12px;
  align-items:flex-start;
  padding:8px 12px;
  border:1px solid #e5e7eb;
  border-radius:14px;
  margin-bottom:8px;
  cursor:pointer;
  transition:.15s;
  background:#fff;
}
.option:hover{background:#f9fafb}
.option.selected{
  background:var(--blue2);
  border-color:#93c5fd;
}
.option.correct{
  background:var(--okbg);
  border-color:#86efac;
}
.option.wrong{
  background:var(--badbg);
  border-color:#fca5a5;
}

.optKey{
  min-width:38px;
  height:38px;
  border-radius:999px;
  background:#eef2ff;
  color:#1e3a8a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:16px;
  margin-top:2px;
}
.optMain{
  flex:1;
  min-width:0;
}
.optText{
  white-space:normal;
  word-break:break-word;
  line-height:1.35;
  font-size:14px;
  font-weight:600;
}
.optTrans{
  margin-top:4px;
  line-height:1.35;
  font-size:12px;
  color:#475569;
  min-height:32px;
}
.optTrans.hidden{
  display:none;
}
.optEn,.optCn{
  display:block;
}

#answerInfo{
  margin-top:12px;
  padding:10px 12px;
  border-radius:12px;
  background:#f0fdf4;
  border:1px solid #bbf7d0;
  color:#166534;
  font-weight:800;
  display:none;
  line-height:1.5;
}

.line{
  padding:10px 14px;
  border-left:4px solid var(--blue);
  border-radius:12px;
  margin-bottom:10px;
  line-height:1.85;
  font-size:18px;
  word-break:break-word;
  white-space:pre-wrap;
  background:transparent;
}

.section{
  margin-bottom:14px;
}
.sectionHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  font-weight:900;
  padding:12px 14px;
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:14px;
  user-select:none;
}
.sectionHead .arrow{
  transition:transform .15s ease;
}
.sectionHead.open .arrow{
  transform:rotate(180deg);
}
.sectionBody{
  margin-top:8px;
  padding:10px 12px;
  border:1px solid #e5e7eb;
  border-radius:14px;
  background:#fff;
}
.collapsed{
  display:none;
}

.tri{
  border:none;
  border-left:5px solid var(--blue);
  border-radius:14px;
  margin-bottom:10px;
  padding:12px 16px;
  background:#f8fafc;
}
.tri .fr,
.tri .en,
.tri .cn{
  padding:0;
  margin:0;
  background:transparent;
  border:none;
  line-height:1.65;
  word-break:break-word;
}
.tri .fr{
  font-weight:900;
  font-size:18px;
  margin-bottom:8px;
}
.tri .en,
.tri .cn{
  font-size:17px;
  color:#374151;
  margin-top:4px;
}

.qtri{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:12px 14px;
  background:#fff;
  margin-bottom:12px;
}
.qtri .fr{
  font-weight:900;
  line-height:1.6;
}
.qtri .en,
.qtri .cn{
  line-height:1.55;
  margin-top:6px;
  color:#374151;
}

.optTriCard{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:10px 12px;
  background:#fff;
  margin-bottom:10px;
}
.optTriHead{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.optTriBadge{
  min-width:28px;
  height:28px;
  border-radius:999px;
  background:#eef2ff;
  color:#1e3a8a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:14px;
}
.optTriCard .fr{
  font-weight:800;
  line-height:1.55;
}
.optTriCard .en,
.optTriCard .cn{
  line-height:1.5;
  margin-top:4px;
  color:#475569;
}

.tag{
  display:block;
  padding:10px 12px;
  border-radius:12px;
  background:#f8fafc;
  margin-bottom:8px;
  line-height:1.6;
  word-break:break-word;
}

.muted{color:var(--muted)}

@media (max-width: 1200px){
  #main{grid-template-columns:24% 32% 44%}
}
@media (max-width: 980px){
  #main{
    grid-template-columns:1fr;
    overflow:auto;
  }
  .panel{min-height:300px}
}
</style>
</head>
<body>

<div id="top">
  <b>TCF 阅读学习系统</b>
  <select id="testSel"></select>
  <button id="prevBtn">⬅ 上一题</button>
  <span id="qLabel">Q 1</span>
  <button id="nextBtn">下一题 ➡</button>
  <button class="ghost" id="toggleEnBtn">EN 显示</button>
  <button class="ghost" id="toggleCnBtn">CN 显示</button>
  <button class="ghost" id="toggleOptBtn">选项翻译</button>
</div>

<div id="main">
  <div class="panel">
    <div class="header">题目与选项</div>
    <div class="body">
      <div id="questionBox">加载中...</div>
      <div id="optionsBox"></div>
      <div id="answerInfo"></div>
    </div>
  </div>

  <div class="panel">
    <div class="header">阅读原文</div>
    <div class="body" id="textBox"></div>
  </div>

  <div class="panel">
    <div class="header">三语解析</div>
    <div class="body">

      <div class="section">
        <div class="sectionHead open" data-target="qTriWrap">
          <span>题干翻译</span>
          <span class="arrow">▼</span>
        </div>
        <div class="sectionBody" id="qTriWrap"></div>
      </div>

      <div class="section">
        <div class="sectionHead open" data-target="triWrap">
          <span>正文三语</span>
          <span class="arrow">▼</span>
        </div>
        <div class="sectionBody" id="triWrap"></div>
      </div>

      <div class="section">
        <div class="sectionHead" data-target="optTriWrap">
          <span>选项翻译</span>
          <span class="arrow">▼</span>
        </div>
        <div class="sectionBody collapsed" id="optTriWrap"></div>
      </div>

      <div class="section">
        <div class="sectionHead open" data-target="kpWrap">
          <span>考点</span>
          <span class="arrow">▼</span>
        </div>
        <div class="sectionBody" id="kpWrap"></div>
      </div>

      <div class="section">
        <div class="sectionHead open" data-target="gnWrap">
          <span>语法提醒</span>
          <span class="arrow">▼</span>
        </div>
        <div class="sectionBody" id="gnWrap"></div>
      </div>

    </div>
  </div>
</div>

<script>
const state = {
  data: {},
  tests: [],
  testKey: "",
  qNum: 1,
  showEn: true,
  showCn: true,
  showOpt: false,
  selKey: "TCF_READ_SEL_V1"
};

function qKey(n){ return "Q" + n; }

function getQObj(){
  return state.data?.[state.testKey]?.[qKey(state.qNum)] || null;
}

function getQNums(testKey){
  const obj = state.data?.[testKey] || {};
  return Object.keys(obj)
    .map(k => parseInt(k.replace(/\D/g,"") || "0",10))
    .filter(n => n > 0)
    .sort((a,b)=>a-b);
}

function maxQ(){
  const arr = getQNums(state.testKey);
  return arr.length ? arr[arr.length - 1] : 1;
}

function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function getStore(){
  try { return JSON.parse(localStorage.getItem(state.selKey) || "{}"); }
  catch { return {}; }
}

function setStore(v){
  localStorage.setItem(state.selKey, JSON.stringify(v));
}

function storeKey(){
  return state.testKey + "_" + qKey(state.qNum);
}

function renderTop(){
  document.getElementById("qLabel").textContent = `${qKey(state.qNum)}/${maxQ()}`;
}

function renderQuestion(){
  const q = getQObj();
  if(!q) return;

  document.getElementById("questionBox").innerHTML = esc(q.question || "无题目");

  const opts = q.options || {};
  const optTri = q.translation_blocks?.options || {};
  const selected = getStore()[storeKey()] || "";
  const box = document.getElementById("optionsBox");
  box.innerHTML = "";

  ["A","B","C","D"].forEach(k=>{
    const tri = (optTri[k] && optTri[k][0]) ? optTri[k][0] : {en:"",cn:""};
    const div = document.createElement("div");
    div.className = "option" + (selected === k ? " selected" : "");

    if(selected){
      if(k === q.answer){
        div.classList.add("correct");
      } else if(selected === k && k !== q.answer){
        div.classList.add("wrong");
      }
    }

    div.innerHTML = `
      <div class="optKey">${k}</div>
      <div class="optMain">
        <div class="optText">${esc(opts[k] || "")}</div>
        <div class="optTrans ${state.showOpt ? "" : "hidden"}">
          <span class="optEn">EN: ${esc(tri.en || "")}</span>
          <span class="optCn">CN: ${esc(tri.cn || "")}</span>
        </div>
      </div>
    `;

    div.onclick = () => {
      const store = getStore();
      store[storeKey()] = k;
      setStore(store);
      renderQuestion();
    };

    box.appendChild(div);
  });

  const ans = q.answer || "";
  const info = document.getElementById("answerInfo");
  if(selected){
    const ok = selected === ans;
    info.style.display = "";
    info.style.background = ok ? "#f0fdf4" : "#fef2f2";
    info.style.borderColor = ok ? "#bbf7d0" : "#fecaca";
    info.style.color = ok ? "#166534" : "#991b1b";
    info.textContent = ok
      ? `已选 ${selected} —— 正确`
      : `已选 ${selected} —— 正确答案是 ${ans}`;
  } else {
    info.style.display = "none";
  }
}

function renderText(){
  const q = getQObj();
  const box = document.getElementById("textBox");
  if(!q){
    box.innerHTML = '<div class="muted">无数据</div>';
    return;
  }

  const blocks = q.translation_blocks?.text || [];
  if(blocks.length){
    box.innerHTML = blocks.map(x => `<div class="line">${esc(x.fr)}</div>`).join("");
  } else {
    const lines = String(q.text || "").split(/\r?\n/).filter(Boolean);
    box.innerHTML = lines.map(x => `<div class="line">${esc(x)}</div>`).join("");
  }
}

function renderQuestionTri(){
  const q = getQObj();
  const box = document.getElementById("qTriWrap");
  if(!q){
    box.innerHTML = '<div class="muted">无数据</div>';
    return;
  }

  const arr = q.translation_blocks?.question || [];
  if(!arr.length){
    box.innerHTML = '<div class="muted">暂无题干翻译</div>';
    return;
  }

  box.innerHTML = arr.map(x => `
    <div class="qtri">
      <div class="fr">FR：${esc(x.fr)}</div>
      ${state.showEn ? `<div class="en">EN：${esc(x.en)}</div>` : ``}
      ${state.showCn ? `<div class="cn">CN：${esc(x.cn)}</div>` : ``}
    </div>
  `).join("");
}

function renderTri(){
  const q = getQObj();
  const box = document.getElementById("triWrap");
  if(!q){
    box.innerHTML = '<div class="muted">无数据</div>';
    return;
  }

  const arr = q.translation_blocks?.text || [];
  box.innerHTML = arr.length
    ? arr.map((x,i) => `
      <div class="tri">
        <div class="fr">${arr.length > 1 ? `${i+1}. ` : ""}${esc(x.fr)}</div>
        ${state.showEn ? `<div class="en">EN: ${esc(x.en)}</div>` : ``}
        ${state.showCn ? `<div class="cn">CN: ${esc(x.cn)}</div>` : ``}
      </div>
    `).join("")
    : `<div class="muted">暂无正文翻译</div>`;
}

function renderOptionTri(){
  const q = getQObj();
  const box = document.getElementById("optTriWrap");
  if(!q){
    box.innerHTML = '<div class="muted">无数据</div>';
    return;
  }

  const opts = q.translation_blocks?.options || {};
  const html = ["A","B","C","D"].map(k=>{
    const t = (opts[k] && opts[k][0]) ? opts[k][0] : null;
    if(!t) return "";
    return `
      <div class="optTriCard">
        <div class="optTriHead">
          <div class="optTriBadge">${k}</div>
        </div>
        <div class="fr">FR：${esc(t.fr || "")}</div>
        ${state.showEn ? `<div class="en">EN：${esc(t.en || "")}</div>` : ``}
        ${state.showCn ? `<div class="cn">CN：${esc(t.cn || "")}</div>` : ``}
      </div>
    `;
  }).join("");

  box.innerHTML = html || `<div class="muted">暂无选项翻译</div>`;
}

function renderKp(){
  const q = getQObj();
  const arr = q?.knowledge_points || [];
  const box = document.getElementById("kpWrap");
  box.innerHTML = arr.length
    ? arr.map(x => `<div class="tag">${esc(x)}</div>`).join("")
    : `<div class="muted">暂无考点</div>`;
}

function renderGn(){
  const q = getQObj();
  const arr = q?.grammar_notes || [];
  const box = document.getElementById("gnWrap");
  box.innerHTML = arr.length
    ? arr.map(x => `<div class="tag">${esc(x)}</div>`).join("")
    : `<div class="muted">暂无语法提醒</div>`;
}

function refresh(){
  if(state.qNum < 1) state.qNum = 1;
  if(state.qNum > maxQ()) state.qNum = maxQ();

  renderTop();
  renderQuestion();
  renderText();
  renderQuestionTri();
  renderTri();
  renderOptionTri();
  renderKp();
  renderGn();
}

async function loadData(){
  try{
    const r = await fetch("https://raw.githubusercontent.com/evolxd/READTEST/main/READ_QUESTIONS_ENRICHED.json");
    if(!r.ok) throw new Error("读取 JSON 失败");
    const data = await r.json();

    state.data = data;
    state.tests = Object.keys(data).sort((a,b)=>{
      const na = parseInt(a.replace(/\D/g,"")||"0",10);
      const nb = parseInt(b.replace(/\D/g,"")||"0",10);
      return na - nb;
    });

    const sel = document.getElementById("testSel");
    sel.innerHTML = state.tests.map(t=>{
      const n = parseInt(t.replace(/\D/g,"")||"0",10);
      return `<option value="${t}">Test ${n}</option>`;
    }).join("");

    state.testKey = state.tests[0];
    state.qNum = 1;
    sel.value = state.testKey;

    sel.onchange = () => {
      state.testKey = sel.value;
      state.qNum = 1;
      refresh();
    };

    refresh();
  }catch(err){
    document.getElementById("questionBox").innerHTML =
      "无法读取 READ_QUESTIONS_ENRICHED.json。请确认 index.html 和 JSON 在同一目录。";
    console.error(err);
  }
}

document.getElementById("prevBtn").onclick = () => {
  state.qNum--;
  refresh();
};

document.getElementById("nextBtn").onclick = () => {
  state.qNum++;
  refresh();
};

document.getElementById("toggleEnBtn").onclick = () => {
  state.showEn = !state.showEn;
  renderQuestionTri();
  renderTri();
  renderOptionTri();
  renderQuestion();
};

document.getElementById("toggleCnBtn").onclick = () => {
  state.showCn = !state.showCn;
  renderQuestionTri();
  renderTri();
  renderOptionTri();
  renderQuestion();
};

document.getElementById("toggleOptBtn").onclick = () => {
  state.showOpt = !state.showOpt;
  renderQuestion();
};

document.querySelectorAll(".sectionHead").forEach(head=>{
  head.addEventListener("click",()=>{
    const id = head.getAttribute("data-target");
    const body = document.getElementById(id);
    if(!body) return;
    body.classList.toggle("collapsed");
    head.classList.toggle("open");
  });
});

window.addEventListener("keydown", e=>{
  const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : "";
  if(tag === "input" || tag === "textarea" || tag === "select") return;
  if(e.code === "ArrowLeft"){ e.preventDefault(); state.qNum--; refresh(); }
  if(e.code === "ArrowRight"){ e.preventDefault(); state.qNum++; refresh(); }
});

loadData();
</script>
</body>
</html>
